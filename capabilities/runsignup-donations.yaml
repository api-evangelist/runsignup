naftiko: 1.0.0-alpha2
info:
  label: RunSignup API — Donations
  description: 'RunSignup API — Donations. 1 operations. Lead operation: Get Race Donations. Self-contained Naftiko capability
    covering one Runsignup business surface.'
  tags:
  - Runsignup
  - Donations
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    RUNSIGNUP_API_KEY: RUNSIGNUP_API_KEY
capability:
  consumes:
  - type: http
    namespace: runsignup-donations
    baseUri: https://runsignup.com/Rest
    description: RunSignup API — Donations business capability. Self-contained, no shared references.
    resources:
    - name: race-race_id-donations-list
      path: /race/{race_id}/donations/list
      operations:
      - name: getracedonations
        method: GET
        description: Get Race Donations
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: page
          in: query
          type: integer
        - name: results_per_page
          in: query
          type: integer
    authentication:
      type: bearer
      token: '{{env.RUNSIGNUP_API_KEY}}'
  exposes:
  - type: rest
    namespace: runsignup-donations-rest
    port: 8080
    description: REST adapter for RunSignup API — Donations. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/race/{race-id}/donations/list
      name: race-race-id-donations-list
      description: REST surface for race-race_id-donations-list.
      operations:
      - method: GET
        name: getracedonations
        description: Get Race Donations
        call: runsignup-donations.getracedonations
        with:
          page: rest.page
          results_per_page: rest.results_per_page
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: runsignup-donations-mcp
    port: 9090
    transport: http
    description: MCP adapter for RunSignup API — Donations. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: get-race-donations
      description: Get Race Donations
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: runsignup-donations.getracedonations
      with:
        page: tools.page
        results_per_page: tools.results_per_page
      outputParameters:
      - type: object
        mapping: $.
