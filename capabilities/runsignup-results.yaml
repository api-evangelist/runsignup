      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: runsignup-results.getraceresults
      with:
        event_id: tools.event_id
        format: tools.format
      outputParameters:
      - type: object
        mapping: $.
    - name: set-race-start-time
      description: Set Race Start Time
      hints:
        readOnly: false
