naftiko: 1.0.0-alpha2
info:
  label: RunSignup API — Results
  description: 'RunSignup API — Results. 6 operations. Lead operation: Clear Race Results. Self-contained Naftiko capability
    covering one Runsignup business surface.'
  tags:
  - Runsignup
  - Results
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    RUNSIGNUP_API_KEY: RUNSIGNUP_API_KEY
capability:
  consumes:
  - type: http
    namespace: runsignup-results
    baseUri: https://runsignup.com/Rest
    description: RunSignup API — Results business capability. Self-contained, no shared references.
    resources:
    - name: race-race_id-results-clear-results
      path: /race/{race_id}/results/clear-results
      operations:
      - name: clearraceresults
        method: POST
        description: Clear Race Results
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: race-race_id-results-csv-import
      path: /race/{race_id}/results/csv-import
      operations:
      - name: importresultsfromcsv
        method: POST
        description: Import Results from CSV
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: race-race_id-results-finishing-times
      path: /race/{race_id}/results/finishing-times
      operations:
      - name: postfinishingtimes
        method: POST
        description: Post Finishing Times
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: race-race_id-results-full-results
      path: /race/{race_id}/results/full-results
      operations:
      - name: postraceresults
        method: POST
        description: Post Full Race Results
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: race-race_id-results-get-results
      path: /race/{race_id}/results/get-results
      operations:
      - name: getraceresults
        method: GET
        description: Get Race Results
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: event_id
          in: query
          type: integer
          description: Filter by specific event ID
        - name: format
          in: query
          type: string
    - name: race-race_id-results-start-time
      path: /race/{race_id}/results/start-time
      operations:
      - name: setracestarttime
        method: POST
        description: Set Race Start Time
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.RUNSIGNUP_API_KEY}}'
  exposes:
  - type: rest
    namespace: runsignup-results-rest
    port: 8080
    description: REST adapter for RunSignup API — Results. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/race/{race-id}/results/clear-results
      name: race-race-id-results-clear-results
      description: REST surface for race-race_id-results-clear-results.
      operations:
      - method: POST
        name: clearraceresults
        description: Clear Race Results
        call: runsignup-results.clearraceresults
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/race/{race-id}/results/csv-import
      name: race-race-id-results-csv-import
      description: REST surface for race-race_id-results-csv-import.
      operations:
      - method: POST
        name: importresultsfromcsv
        description: Import Results from CSV
        call: runsignup-results.importresultsfromcsv
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/race/{race-id}/results/finishing-times
      name: race-race-id-results-finishing-times
      description: REST surface for race-race_id-results-finishing-times.
      operations:
      - method: POST
        name: postfinishingtimes
        description: Post Finishing Times
        call: runsignup-results.postfinishingtimes
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/race/{race-id}/results/full-results
      name: race-race-id-results-full-results
      description: REST surface for race-race_id-results-full-results.
      operations:
      - method: POST
        name: postraceresults
        description: Post Full Race Results
        call: runsignup-results.postraceresults
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/race/{race-id}/results/get-results
      name: race-race-id-results-get-results
      description: REST surface for race-race_id-results-get-results.
      operations:
      - method: GET
        name: getraceresults
        description: Get Race Results
        call: runsignup-results.getraceresults
        with:
          event_id: rest.event_id
          format: rest.format
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/race/{race-id}/results/start-time
      name: race-race-id-results-start-time
      description: REST surface for race-race_id-results-start-time.
      operations:
      - method: POST
        name: setracestarttime
        description: Set Race Start Time
        call: runsignup-results.setracestarttime
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: runsignup-results-mcp
    port: 9090
    transport: http
    description: MCP adapter for RunSignup API — Results. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: clear-race-results
      description: Clear Race Results
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: runsignup-results.clearraceresults
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: import-results-csv
      description: Import Results from CSV
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: runsignup-results.importresultsfromcsv
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: post-finishing-times
      description: Post Finishing Times
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: runsignup-results.postfinishingtimes
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: post-full-race-results
      description: Post Full Race Results
      hints:
