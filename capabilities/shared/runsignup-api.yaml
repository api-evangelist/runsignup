naftiko: "1.0.0-alpha1"

info:
  label: "RunSignup API"
  description: "RunSignup REST API for race registration and event management - races, participants, results, timing, teams, and fundraising."
  tags:
    - RunSignup
    - Race Registration
    - Event Management
    - Running
    - Sports
    - Timing
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      RUNSIGNUP_API_KEY: RUNSIGNUP_API_KEY
      RUNSIGNUP_API_SECRET: RUNSIGNUP_API_SECRET

capability:
  consumes:
    - type: http
      namespace: runsignup
      baseUri: "https://runsignup.com/Rest"
      description: "RunSignup REST API for race event management"
      authentication:
        type: apikey
        key: api_key
        value: "{{env.RUNSIGNUP_API_KEY}}"
        placement: query
      resources:
        - name: races
          path: /races
          description: "Search and list races"
          operations:
            - name: get-races
              method: GET
              description: "List upcoming races"
              inputParameters:
                - name: api_secret
                  in: query
                  type: string
                  required: true
                  description: "API secret"
                - name: format
                  in: query
                  type: string
                  required: false
                  description: "Response format (json/xml)"
                - name: search_term
                  in: query
                  type: string
                  required: false
                  description: "Search by race name"
                - name: state
                  in: query
                  type: string
                  required: false
                  description: "Filter by state"
                - name: results_per_page
                  in: query
                  type: integer
                  required: false
                  description: "Results per page (max 1000)"
                - name: events
                  in: query
                  type: string
                  required: false
                  description: "Include events (T/F)"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: race
          path: /race/{race_id}
          description: "Get detailed race information"
          operations:
            - name: get-race
              method: GET
              description: "Get race details by ID"
              inputParameters:
                - name: race_id
                  in: path
                  type: integer
                  required: true
                  description: "Race ID"
                - name: api_secret
                  in: query
                  type: string
                  required: true
                  description: "API secret"
                - name: format
                  in: query
                  type: string
                  required: false
                  description: "Response format"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: participants
          path: /race/{race_id}/participants
          description: "Manage race participants"
          operations:
            - name: get-participants
              method: GET
              description: "Get registered participants for a race"
              inputParameters:
                - name: race_id
                  in: path
                  type: integer
                  required: true
                  description: "Race ID"
                - name: api_secret
                  in: query
                  type: string
                  required: true
                  description: "API secret"
                - name: event_id
                  in: query
                  type: integer
                  required: false
                  description: "Filter by event ID"
                - name: results_per_page
                  in: query
                  type: integer
                  required: false
                  description: "Results per page"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: bib-chip
          path: /race/{race_id}/get-bib-chip
          description: "Get bib and chip assignments"
          operations:
            - name: get-bib-chip
              method: GET
              description: "Get bib number and chip assignments for a race event"
              inputParameters:
                - name: race_id
                  in: path
                  type: integer
                  required: true
                  description: "Race ID"
                - name: api_secret
                  in: query
                  type: string
                  required: true
                  description: "API secret"
                - name: event_id
                  in: query
                  type: integer
                  required: false
                  description: "Event ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: results
          path: /race/{race_id}/results/get-results
          description: "Retrieve race results"
          operations:
            - name: get-results
              method: GET
              description: "Get all results for a race"
              inputParameters:
                - name: race_id
                  in: path
                  type: integer
                  required: true
                  description: "Race ID"
                - name: api_secret
                  in: query
                  type: string
                  required: true
                  description: "API secret"
                - name: event_id
                  in: query
                  type: integer
                  required: false
                  description: "Filter by event ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: post-results
          path: /race/{race_id}/results/full-results
          description: "Submit race results"
          operations:
            - name: post-full-results
              method: POST
              description: "Submit complete race results for an event"
              inputParameters:
                - name: race_id
                  in: path
                  type: integer
                  required: true
                  description: "Race ID"
              body:
                type: json
                data:
                  api_key: "{{env.RUNSIGNUP_API_KEY}}"
                  api_secret: "{{env.RUNSIGNUP_API_SECRET}}"
                  event_id: "{{tools.event_id}}"
                  results: "{{tools.results}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: divisions
          path: /race/{race_id}/divisions/divisions
          description: "Race age group divisions"
          operations:
            - name: get-divisions
              method: GET
              description: "Get race divisions"
              inputParameters:
                - name: race_id
                  in: path
                  type: integer
                  required: true
                  description: "Race ID"
                - name: api_secret
                  in: query
                  type: string
                  required: true
                  description: "API secret"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: teams
          path: /race/{race_id}/teams
          description: "Race team management"
          operations:
            - name: get-teams
              method: GET
              description: "Get teams registered for a race"
              inputParameters:
                - name: race_id
                  in: path
                  type: integer
                  required: true
                  description: "Race ID"
                - name: api_secret
                  in: query
                  type: string
                  required: true
                  description: "API secret"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: donations
          path: /race/{race_id}/donations/list
          description: "Race donation data"
          operations:
            - name: get-donations
              method: GET
              description: "Get donations for a race"
              inputParameters:
                - name: race_id
                  in: path
                  type: integer
                  required: true
                  description: "Race ID"
                - name: api_secret
                  in: query
                  type: string
                  required: true
                  description: "API secret"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8101
      namespace: runsignup-rest
      resources:
        - path: /v1/races
          name: races
          description: "Race search and listing"
          operations:
            - method: GET
              name: get-races
              description: "List races"
              call: "runsignup.get-races"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/races/{race_id}
          name: race
          description: "Individual race details"
          operations:
            - method: GET
              name: get-race
              description: "Get race by ID"
              call: "runsignup.get-race"
              with:
                race_id: "rest.race_id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/races/{race_id}/participants
          name: participants
          description: "Race participants"
          operations:
            - method: GET
              name: get-participants
              description: "Get participants"
              call: "runsignup.get-participants"
              with:
                race_id: "rest.race_id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/races/{race_id}/results
          name: results
          description: "Race results"
          operations:
            - method: GET
              name: get-results
              description: "Get race results"
              call: "runsignup.get-results"
              with:
                race_id: "rest.race_id"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9101
      namespace: runsignup-mcp
      transport: http
      tools:
        - name: get-races
          description: "Search and list upcoming races on RunSignup"
          hints:
            readOnly: true
            openWorld: true
          call: "runsignup.get-races"
          with:
            search_term: "tools.search_term"
            state: "tools.state"
            results_per_page: "tools.results_per_page"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-race
          description: "Get detailed information about a specific race"
          hints:
            readOnly: true
            openWorld: true
          call: "runsignup.get-race"
          with:
            race_id: "tools.race_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-participants
          description: "Get registered participants for a race"
          hints:
            readOnly: true
            openWorld: false
          call: "runsignup.get-participants"
          with:
            race_id: "tools.race_id"
            event_id: "tools.event_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-bib-chip
          description: "Get bib number and chip assignments for a race event"
          hints:
            readOnly: true
            openWorld: false
          call: "runsignup.get-bib-chip"
          with:
            race_id: "tools.race_id"
            event_id: "tools.event_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-results
          description: "Get race results for all participants"
          hints:
            readOnly: true
            openWorld: true
          call: "runsignup.get-results"
          with:
            race_id: "tools.race_id"
            event_id: "tools.event_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: post-results
          description: "Submit race results for a RunSignup event"
          hints:
            readOnly: false
            openWorld: false
          call: "runsignup.post-full-results"
          with:
            race_id: "tools.race_id"
            event_id: "tools.event_id"
            results: "tools.results"
          outputParameters:
            - type: object
              mapping: "$."
