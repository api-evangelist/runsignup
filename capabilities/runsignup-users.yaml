naftiko: 1.0.0-alpha2
info:
  label: RunSignup API — Users
  description: 'RunSignup API — Users. 3 operations. Lead operation: Create User Account. Self-contained Naftiko capability
    covering one Runsignup business surface.'
  tags:
  - Runsignup
  - Users
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    RUNSIGNUP_API_KEY: RUNSIGNUP_API_KEY
capability:
  consumes:
  - type: http
    namespace: runsignup-users
    baseUri: https://runsignup.com/Rest
    description: RunSignup API — Users business capability. Self-contained, no shared references.
    resources:
    - name: user
      path: /user
      operations:
      - name: createuser
        method: POST
        description: Create User Account
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: user-user_id
      path: /user/{user_id}
      operations:
      - name: getuser
        method: GET
        description: Get User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: user_id
          in: path
          type: integer
          description: The unique user ID
          required: true
    - name: users
      path: /users
      operations:
      - name: getusers
        method: GET
        description: Get Partner Users
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: format
          in: query
          type: string
        - name: page
          in: query
          type: integer
    authentication:
      type: bearer
      token: '{{env.RUNSIGNUP_API_KEY}}'
  exposes:
  - type: rest
    namespace: runsignup-users-rest
    port: 8080
    description: REST adapter for RunSignup API — Users. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/user
      name: user
      description: REST surface for user.
      operations:
      - method: POST
        name: createuser
        description: Create User Account
        call: runsignup-users.createuser
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/user/{user-id}
      name: user-user-id
      description: REST surface for user-user_id.
      operations:
      - method: GET
        name: getuser
        description: Get User
        call: runsignup-users.getuser
        with:
          user_id: rest.user_id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/users
      name: users
      description: REST surface for users.
      operations:
      - method: GET
        name: getusers
        description: Get Partner Users
        call: runsignup-users.getusers
        with:
          format: rest.format
          page: rest.page
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: runsignup-users-mcp
    port: 9090
    transport: http
    description: MCP adapter for RunSignup API — Users. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: create-user-account
      description: Create User Account
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: runsignup-users.createuser
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-user
      description: Get User
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: runsignup-users.getuser
      with:
        user_id: tools.user_id
      outputParameters:
      - type: object
        mapping: $.
    - name: get-partner-users
      description: Get Partner Users
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: runsignup-users.getusers
      with:
        format: tools.format
        page: tools.page
      outputParameters:
      - type: object
        mapping: $.
