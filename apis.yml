aid: runsignup
name: RunSignup
description: >-
  Gets a list of races, with information similar to Get Race, except that only the
  most current events are listed. Event start and end times are in the timezone of
  the race. All other dates/times are in Eastern Time. The races are separated into
  pages. The maximum number of races per page is 1,000.
